<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trivial Familiar ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --yellow:#FFD93D;--pink:#FF6B9D;--blue:#4ECDC4;--purple:#A29BFE;
  --orange:#FF8C42;--green:#6BCB77;--red:#FF4757;
  --bg:#0D1117;--card:#161B22;--card2:#1C2333;--card3:#21262D;
  --text:#F0F6FC;--text2:#8B949E;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 15% 15%,rgba(162,155,254,.1) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 85%,rgba(78,205,196,.07) 0%,transparent 55%);
  pointer-events:none;z-index:0;}
.screen{display:none;position:relative;z-index:1;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 3s infinite;}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.8;transform:scale(1.3)}}

/* BUTTONS */
.btn{font-family:'Fredoka One',cursive;font-size:1rem;border:none;border-radius:50px;padding:12px 24px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;}
.btn:active{transform:scale(.95);}
.btn-primary{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#0D1117;box-shadow:0 5px 18px rgba(255,140,66,.35);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,140,66,.5);}
.btn-secondary{background:linear-gradient(135deg,var(--purple),var(--blue));color:white;}
.btn-danger{background:linear-gradient(135deg,#ff6b6b,var(--red));color:white;}
.btn-sm{padding:8px 16px;font-size:.88rem;}
.w-full{width:100%;}

/* ========================= WELCOME ========================= */
#screen-welcome{align-items:center;justify-content:flex-start;padding:16px 16px 32px;gap:14px;text-align:center;overflow-y:auto;}
.logo-area{animation:float 3s ease-in-out infinite;flex-shrink:0;padding-top:8px;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.logo-emoji{font-size:3rem;}
.logo-title{font-family:'Fredoka One',cursive;font-size:clamp(1.7rem,7vw,2.5rem);background:linear-gradient(135deg,var(--yellow),var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:2px;}
.welcome-card{background:var(--card);border-radius:20px;padding:18px;max-width:440px;width:100%;border:1px solid rgba(255,255,255,.07);box-shadow:0 16px 48px rgba(0,0,0,.5);}
.wc-title{font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--yellow);margin-bottom:11px;}
.divider{height:1px;background:rgba(255,255,255,.06);margin:14px 0;}

/* PLAYER LIST */
.player-list{display:flex;flex-direction:column;gap:9px;margin-bottom:11px;}
.player-item{background:var(--card2);border-radius:13px;padding:9px 11px;display:flex;flex-direction:column;border:2px solid rgba(255,255,255,.06);animation:slideIn .3s ease;transition:border-color .25s,background .25s;}
.player-item.mode-baby{border-color:rgba(255,107,157,.45);background:rgba(255,107,157,.06);}
.player-item.mode-adult{border-color:rgba(162,155,254,.45);background:rgba(162,155,254,.06);}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
.player-row-top{display:flex;align-items:center;gap:9px;}
.player-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;cursor:pointer;transition:transform .2s;}
.player-avatar:hover{transform:scale(1.12);}
.player-name-input{flex:1;background:transparent;border:none;color:white;font-family:'Nunito',sans-serif;font-size:.93rem;font-weight:700;outline:none;min-width:0;}
.player-name-input::placeholder{color:rgba(255,255,255,.25);}
.remove-player{background:rgba(255,71,87,.18);border:none;color:var(--red);border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.remove-player:hover{background:var(--red);color:white;}
.mode-row{display:flex;align-items:center;gap:7px;padding:7px 2px 1px;border-top:1px solid rgba(255,255,255,.05);margin-top:7px;}
.mode-row label{font-size:.75rem;font-weight:800;color:var(--text2);flex-shrink:0;}
.mode-pills{display:flex;gap:5px;flex:1;}
.mode-pill{flex:1;padding:5px 3px;border:2px solid rgba(255,255,255,.1);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-family:'Fredoka One',cursive;font-size:.7rem;text-align:center;transition:all .2s;white-space:nowrap;}
.mode-pill.active-kid{border-color:#4ECDC4;background:rgba(78,205,196,.15);color:#4ECDC4;}
.mode-pill.active-baby{border-color:var(--pink);background:rgba(255,107,157,.15);color:var(--pink);}
.mode-pill.active-adult{border-color:var(--purple);background:rgba(162,155,254,.15);color:var(--purple);}
.mode-badge{font-size:.66rem;font-weight:800;padding:2px 6px;border-radius:20px;white-space:nowrap;}
.mode-badge.kid{background:rgba(78,205,196,.2);color:#4ECDC4;}
.mode-badge.baby{background:rgba(255,107,157,.2);color:var(--pink);}
.mode-badge.adult{background:rgba(162,155,254,.2);color:var(--purple);}
.add-player-btn{background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.18);border-radius:13px;padding:10px;color:var(--text2);cursor:pointer;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;width:100%;transition:all .2s;}
.add-player-btn:hover{border-color:var(--purple);color:var(--purple);}
.time-selector{display:flex;gap:7px;margin-bottom:14px;}
.time-btn{flex:1;padding:10px 4px;border:2px solid rgba(255,255,255,.12);border-radius:13px;background:transparent;color:var(--text2);cursor:pointer;font-family:'Fredoka One',cursive;font-size:.9rem;transition:all .2s;text-align:center;}
.time-btn.selected{border-color:var(--yellow);background:rgba(255,217,61,.12);color:var(--yellow);}
.category-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.cat-btn{padding:11px 5px;border:2px solid rgba(255,255,255,.08);border-radius:13px;background:var(--card2);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;color:var(--text2);transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;}
.cat-btn .cat-emoji{font-size:1.5rem;}
.cat-btn[data-cat="patrulla"].selected{color:#FF6B35;background:rgba(255,107,53,.18);border-color:#FF6B35;}
.cat-btn[data-cat="disney"].selected{color:#4ECDC4;background:rgba(78,205,196,.18);border-color:#4ECDC4;}
.cat-btn[data-cat="superheroes"].selected{color:#A29BFE;background:rgba(162,155,254,.18);border-color:#A29BFE;}
.cat-btn[data-cat="viajes"].selected{color:#FFD93D;background:rgba(255,217,61,.12);border-color:#FFD93D;}

/* ========================= BOARD ========================= */
#screen-board{padding:0;overflow:hidden;}
.board-header{background:var(--card);padding:8px 13px;display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;gap:10px;}
.bh-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;}
.bh-name{font-weight:800;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;}
.bh-hint{font-size:.68rem;color:var(--text2);}
.timer-display{display:flex;align-items:center;gap:5px;background:var(--card2);padding:7px 11px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:.9rem;white-space:nowrap;}
.timer-display.warning{color:var(--red);animation:pulse .5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.board-area{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#boardCanvas{display:block;touch-action:none;}
.dice-panel{background:var(--card);border-top:1px solid rgba(255,255,255,.05);padding:9px 14px;display:flex;align-items:center;gap:11px;flex-shrink:0;}
.dice-btn{width:60px;height:60px;border-radius:15px;background:linear-gradient(135deg,#fff,#eee);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2rem;transition:all .25s;box-shadow:0 4px 14px rgba(0,0,0,.5);flex-shrink:0;color:#1a1a1a;}
.dice-btn:hover{transform:scale(1.07);}
.dice-btn.rolling{animation:diceRoll .45s ease;}
.dice-btn.used{opacity:.4;cursor:not-allowed;}
@keyframes diceRoll{0%{transform:rotate(0)}30%{transform:rotate(-20deg) scale(1.12)}60%{transform:rotate(18deg) scale(1.12)}100%{transform:rotate(0) scale(1)}}
.dice-num{font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--yellow);min-width:38px;text-align:center;}
.dice-info{flex:1;min-width:0;}
.dice-info .dn{font-family:'Fredoka One',cursive;font-size:.98rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dice-info .dh{font-size:.73rem;color:var(--text2);margin-top:2px;}
.mini-scores{position:absolute;top:7px;right:7px;display:flex;flex-direction:column;gap:4px;z-index:5;}
.ms-item{background:rgba(10,14,20,.82);border-radius:9px;padding:4px 8px;display:flex;align-items:center;gap:5px;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px);}
.ms-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;}
.ms-name{font-size:.68rem;font-weight:800;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ms-pts{font-family:'Fredoka One',cursive;font-size:.74rem;color:var(--yellow);}
.ms-item.active-turn{border-color:rgba(255,217,61,.6);background:rgba(255,217,61,.1);}

/* Dice direction buttons */
.dir-btns{display:flex;gap:7px;align-items:center;}
.dir-btn{background:var(--card2);border:2px solid rgba(255,255,255,.12);border-radius:50%;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s;color:white;font-family:'Fredoka One',cursive;}
.dir-btn:hover{background:rgba(255,217,61,.2);border-color:var(--yellow);}
.dir-btn:disabled{opacity:.3;cursor:not-allowed;}

/* ========================= QUESTION ========================= */
#screen-question{padding:0;}
.q-header{background:var(--card);padding:9px 13px;display:flex;align-items:center;gap:9px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.q-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;}
.q-pname{font-weight:800;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-pmode{font-size:.7rem;color:var(--text2);}
.q-area{flex:1;padding:13px;display:flex;flex-direction:column;gap:11px;overflow-y:auto;}
.q-cat{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:50px;font-size:.78rem;font-weight:800;align-self:flex-start;}
.q-banner{border-radius:11px;padding:6px 11px;display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:800;}
.q-banner.baby{background:rgba(255,107,157,.14);border:1px solid rgba(255,107,157,.3);color:#ffb3d0;}
.q-banner.adult{background:rgba(162,155,254,.14);border:1px solid rgba(162,155,254,.3);color:#c9c3ff;}
.q-img{border-radius:16px;overflow:hidden;background:var(--card2);height:125px;display:flex;align-items:center;justify-content:center;position:relative;border:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.q-img .qem{font-size:4rem;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4));animation:float 2s ease-in-out infinite;}
.q-img .qlbl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.72));padding:12px 9px 6px;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.8);text-align:center;}
.q-text{font-family:'Fredoka One',cursive;font-size:clamp(.98rem,3.5vw,1.24rem);line-height:1.45;text-align:center;color:white;padding:2px 4px;}
.a-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.a-btn{background:var(--card2);border:2px solid rgba(255,255,255,.09);border-radius:13px;padding:12px 9px;color:white;font-family:'Nunito',sans-serif;font-size:.84rem;font-weight:800;cursor:pointer;transition:all .2s;text-align:center;line-height:1.3;}
.a-btn:hover:not(:disabled){border-color:var(--purple);background:rgba(162,155,254,.13);transform:scale(1.02);}
.a-grid-baby{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.a-btn-baby{background:var(--card2);border:3px solid rgba(255,255,255,.09);border-radius:18px;padding:12px 6px 10px;color:white;cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;min-height:100px;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.22);}
.a-btn-baby:hover:not(:disabled){transform:scale(1.05);}
.a-btn-baby .aem{font-size:2.6rem;filter:drop-shadow(0 2px 5px rgba(0,0,0,.3));}
.a-btn-baby .albl{font-family:'Fredoka One',cursive;font-size:.82rem;color:rgba(255,255,255,.85);}
.a-btn-baby.bc0{border-color:rgba(255,107,157,.4);background:rgba(255,107,157,.09);}
.a-btn-baby.bc1{border-color:rgba(78,205,196,.4);background:rgba(78,205,196,.09);}
.a-btn-baby.bc2{border-color:rgba(255,217,61,.35);background:rgba(255,217,61,.07);}
.a-btn-baby.bc3{border-color:rgba(162,155,254,.4);background:rgba(162,155,254,.09);}
.a-btn.correct,.a-btn-baby.correct{background:rgba(107,203,119,.28)!important;border-color:var(--green)!important;animation:cpop .5s ease;}
.a-btn.wrong,.a-btn-baby.wrong{background:rgba(255,71,87,.28)!important;border-color:var(--red)!important;animation:cshake .4s ease;}
.a-btn:disabled,.a-btn-baby:disabled{cursor:default;}
@keyframes cpop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes cshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* FEEDBACK */
.fb-ov{position:fixed;inset:0;background:rgba(0,0,0,.76);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(5px);animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fb-card{background:var(--card);border-radius:22px;padding:24px 20px;max-width:295px;width:88%;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.08);animation:popIn .27s cubic-bezier(.175,.885,.32,1.275);}
@keyframes popIn{from{opacity:0;transform:scale(.82) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.fb-em{font-size:3rem;margin-bottom:7px;}
.fb-title{font-family:'Fredoka One',cursive;font-size:1.55rem;margin-bottom:5px;}
.fb-sub{color:var(--text2);font-size:.86rem;margin-bottom:13px;line-height:1.4;white-space:pre-line;}
.queso-row{background:rgba(255,217,61,.12);border:2px solid var(--yellow);border-radius:11px;padding:8px;margin-bottom:13px;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Fredoka One',cursive;color:var(--yellow);font-size:.92rem;}

/* RESULTS */
#screen-results{padding:16px;align-items:center;gap:14px;overflow-y:auto;}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;width:100%;max-width:320px;margin:4px 0;}
.podium-place{display:flex;flex-direction:column;align-items:center;gap:5px;}
.podium-crown{font-size:1.4rem;}
.podium-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;border:3px solid rgba(255,255,255,.22);}
.podium-name{font-family:'Fredoka One',cursive;font-size:.76rem;text-align:center;max-width:74px;}
.podium-block{border-radius:9px 9px 0 0;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.25rem;color:rgba(0,0,0,.28);width:72px;}
.podium-block.gold{height:82px;background:linear-gradient(135deg,var(--yellow),#FFB700);}
.podium-block.silver{height:58px;background:linear-gradient(135deg,#C8C8C8,#A0A0A0);}
.podium-block.bronze{height:42px;background:linear-gradient(135deg,#CD7F32,#9A5C24);}
.results-list{width:100%;max-width:390px;display:flex;flex-direction:column;gap:6px;}
.result-item{background:var(--card);border-radius:13px;padding:10px 12px;display:flex;align-items:center;gap:9px;border:1px solid rgba(255,255,255,.05);}
.result-pos{font-family:'Fredoka One',cursive;font-size:1.2rem;width:26px;text-align:center;}
.result-info{flex:1;}
.result-name{font-weight:800;font-size:.9rem;}
.result-stats{font-size:.74rem;color:var(--text2);}
.result-score{font-family:'Fredoka One',cursive;font-size:.97rem;color:var(--yellow);}

/* CONFETTI */
.cfp{position:fixed;width:9px;height:9px;top:-10px;border-radius:2px;animation:cffall linear forwards;z-index:300;pointer-events:none;}
@keyframes cffall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
/* PAUSE */
.pause-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:250;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:13px;backdrop-filter:blur(10px);}
.pause-ov h2{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--yellow);}
/* TOAST */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,14,20,.92);border:2px solid var(--yellow);border-radius:18px;padding:16px 26px;text-align:center;z-index:150;backdrop-filter:blur(8px);animation:popIn .22s ease;pointer-events:none;}
.toast .tn{font-family:'Fredoka One',cursive;font-size:3.2rem;color:var(--yellow);line-height:1;}
.toast .tt{font-size:.88rem;color:var(--text2);margin-top:3px;}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
</style>
</head>
<body>
<div class="stars" id="starsContainer"></div>

<!-- =================== WELCOME =================== -->
<div id="screen-welcome" class="screen active">
  <div style="padding-top:14px;">
    <div class="logo-area" style="text-align:center;">
      <div class="logo-emoji">🌟</div>
      <div class="logo-title">¡Trivial!</div>
      <div style="color:var(--text2);font-size:.8rem;margin-top:1px;">El juego de la familia</div>
    </div>
  </div>
  <div class="welcome-card" style="margin-bottom:22px;">
    <div class="wc-title">👥 ¿Quién juega hoy?</div>
    <div class="player-list" id="playerList"></div>
    <button class="add-player-btn" id="addPlayerBtn">+ Añadir jugador</button>
    <div class="divider"></div>
    <div class="wc-title">⏱ ¿Cuánto tiempo?</div>
    <div class="time-selector">
      <button class="time-btn" data-min="30">30 min</button>
      <button class="time-btn selected" data-min="60">60 min</button>
      <button class="time-btn" data-min="90">90 min</button>
    </div>
    <div class="divider"></div>
    <div class="wc-title">🎯 Categorías</div>
    <div class="category-grid">
      <button class="cat-btn selected" data-cat="patrulla"><span class="cat-emoji">🐾</span>Patrulla Canina</button>
      <button class="cat-btn selected" data-cat="disney"><span class="cat-emoji">✨</span>Disney</button>
      <button class="cat-btn selected" data-cat="superheroes"><span class="cat-emoji">🦸</span>Superhéroes</button>
      <button class="cat-btn selected" data-cat="viajes"><span class="cat-emoji">🌍</span>Viajes</button>
    </div>
    <button class="btn btn-primary w-full" id="startGameBtn" style="justify-content:center;font-size:1.1rem;padding:14px;">🚀 ¡Empezar!</button>
  </div>
</div>

<!-- =================== BOARD =================== -->
<div id="screen-board" class="screen">
  <div class="board-header">
    <div class="bh-av" id="bhAv"></div>
    <div style="flex:1;min-width:0;">
      <div class="bh-name" id="bhName"></div>
      <div class="bh-hint" id="bhHint"></div>
    </div>
    <div class="timer-display" id="timerDisplay">⏱ --:--</div>
    <button class="btn btn-secondary btn-sm" id="pauseBtn">⏸</button>
  </div>
  <div class="board-area">
    <canvas id="boardCanvas"></canvas>
    <div class="mini-scores" id="miniScores"></div>
  </div>
  <div class="dice-panel">
    <button class="dice-btn" id="diceBtn">🎲</button>
    <div class="dice-num" id="diceNum">?</div>

/* ========================================================
   BOARD GRAPH
   The board has 3 concentric loops connected by 2 bridges.
   Outer ring: nodes 0-29  (30 squares)
   Inner ring: nodes 30-47 (18 squares)
   Bridge 1: outer[0] ↔ inner[0]  (top)
   Bridge 2: outer[15] ↔ inner[9] (bottom)

   For simplicity we use a flat graph: each node has
   adjacency list. Players navigate using +1/-1 on a path,
   but at junction nodes they get to choose which branch.
   
   We represent the board as two rings + 2 spokes.
   OUTER: 30 nodes  (indices 0..29)
   INNER: 18 nodes  (indices 30..47)
   Junctions at outer[0]↔inner[0], outer[8]↔inner[5], outer[15]↔inner[9], outer[23]↔inner[14]
   = 4 spokes connecting at 4 points
   ======================================================== */

// Build board positions
// Outer ring: 30 nodes, radius Ro
// Inner ring: 18 nodes, radius Ri
// 4 junction pairs connecting them
const OUTER_N = 30;
const INNER_N = 18;
const TOTAL_NODES = OUTER_N + INNER_N; // 48

// Outer categories cycling through 4 (+start at 0)
function buildBoardCats(){
  const cats=[];
  const cycle=['patrulla','disney','superheroes','viajes'];
  for(let i=0;i<OUTER_N;i++) cats.push(i===0?'start': i===7||i===22?'junction': cycle[i%4]);
  for(let i=0;i<INNER_N;i++) cats.push(i===0||i===9?'junction': cycle[(i+1)%4]);
  return cats;
}
const BOARD_CATS=buildBoardCats();

// Adjacency for each node: { fwd, bwd }  (circular)
// Outer: 0↔1↔2...↔29↔0
// Inner: 30↔31↔...↔47↔30
// Spokes: outer7 ↔ inner30 ↔ ... outer22 ↔ inner39
// Junction nodes have extra connections
function buildGraph(){
  const adj=Array.from({length:TOTAL_NODES},()=>new Set());
  // Outer ring
  for(let i=0;i<OUTER_N;i++){
    const nxt=(i+1)%OUTER_N;
    adj[i].add(nxt); adj[nxt].add(i);
  }
  // Inner ring
  for(let i=0;i<INNER_N;i++){
    const a=OUTER_N+i, b=OUTER_N+((i+1)%INNER_N);
    adj[a].add(b); adj[b].add(a);
  }
  // 4 spokes (junctions)
  const spokes=[[7,OUTER_N+0],[15,OUTER_N+5],[22,OUTER_N+9],[0,OUTER_N+14]];
  spokes.forEach(([o,inn])=>{
    adj[o].add(inn); adj[inn].add(o);
  });
  return adj;
}
const GRAPH=buildGraph();

/* ========================================================
   BOARD CANVAS
   ======================================================== */
let nodePositions=[];
let nodeRadius=0;

function computePositions(W,H){
  const cx=W/2, cy=H/2;
  const Ro=Math.min(W,H)*0.40; // outer ring radius
  const Ri=Math.min(W,H)*0.22; // inner ring radius
  nodeRadius=Math.min(W,H)*0.058;

  nodePositions=[];
  // Outer ring: 30 nodes
  for(let i=0;i<OUTER_N;i++){
    const a=(i/OUTER_N)*Math.PI*2 - Math.PI/2;
    nodePositions.push({x:cx+Ro*Math.cos(a), y:cy+Ro*Math.sin(a)});
  }
  // Inner ring: 18 nodes
  for(let i=0;i<INNER_N;i++){
    const a=(i/INNER_N)*Math.PI*2 - Math.PI/2;
    nodePositions.push({x:cx+Ri*Math.cos(a), y:cy+Ri*Math.sin(a)});
  }
}

function drawBoard(){
  const canvas=document.getElementById('boardCanvas');
  const area=canvas.parentElement;
  const W=area.clientWidth, H=area.clientHeight;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  computePositions(W,H);
  const cx=W/2,cy=H/2;

  // ---- Draw edges ----
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.07)';
  ctx.lineWidth=2;

  // Outer ring path
  ctx.beginPath();
  nodePositions.slice(0,OUTER_N).forEach((p,i)=>{
    i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
  });
  ctx.closePath();ctx.stroke();

  // Inner ring path
  ctx.beginPath();
  nodePositions.slice(OUTER_N).forEach((p,i)=>{
    i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
  });
  ctx.closePath();ctx.stroke();

  // Spoke connections (bridges)
  const spokes=[[7,OUTER_N+0],[15,OUTER_N+5],[22,OUTER_N+9],[0,OUTER_N+14]];
  ctx.strokeStyle='rgba(255,107,157,0.3)';
  ctx.lineWidth=2;
  ctx.setLineDash([5,4]);
  spokes.forEach(([o,inn])=>{
    ctx.beginPath();
    ctx.moveTo(nodePositions[o].x,nodePositions[o].y);
    ctx.lineTo(nodePositions[inn].x,nodePositions[inn].y);
    ctx.stroke();
  });
  ctx.setLineDash([]);
  ctx.restore();

  // ---- Center ----
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*0.18);
  grad.addColorStop(0,'rgba(28,35,51,0.85)');
  grad.addColorStop(1,'rgba(13,17,23,0.2)');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(cx,cy,Math.min(W,H)*0.17,0,Math.PI*2);ctx.fill();
  ctx.save();
  ctx.font=`bold ${Math.min(W,H)*0.045}px Fredoka One,cursive`;
  ctx.fillStyle='rgba(255,255,255,0.11)';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🌟 TRIVIAL',cx,cy-8);
  ctx.font=`${Math.min(W,H)*0.026}px Nunito`;
  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.fillText('¡Tira el dado!',cx,cy+14);
  ctx.restore();

  // ---- Draw nodes ----
  for(let i=0;i<TOTAL_NODES;i++){
    const {x,y}=nodePositions[i];
    const cat=BOARD_CATS[i];
    const cd=CAT_DEF[cat]||CAT_DEF.start;
    const hasPlayer=state.players.some(p=>p.pos===i);

    // Glow for nodes with players
    if(hasPlayer){
      ctx.save();
      ctx.shadowBlur=18;ctx.shadowColor=cd.color;
      ctx.restore();
    }

    // Node circle
    ctx.save();
    if(hasPlayer){ctx.shadowBlur=14;ctx.shadowColor=cd.color;}
    ctx.fillStyle=cd.light;
    ctx.strokeStyle=cd.color;
    ctx.lineWidth=hasPlayer?2.5:1.5;
    ctx.beginPath();ctx.arc(x,y,nodeRadius,0,Math.PI*2);
    ctx.fill();ctx.stroke();
    ctx.restore();

    // Emoji
    ctx.save();
    ctx.font=`${nodeRadius*0.78}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(cd.emoji,x,y-nodeRadius*0.1);
    ctx.restore();

    // Number label (small)
    ctx.save();
    ctx.font=`bold ${nodeRadius*0.38}px Nunito`;
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    const label=i<OUTER_N?(cat==='start'?'S':String(i+1)):`i${i-OUTER_N+1}`;
    ctx.fillText(label,x,y+nodeRadius*0.52);
    ctx.restore();
  }

  // ---- Draw player tokens ----
  state.players.forEach((pl,pi)=>{
    const {x,y}=nodePositions[pl.pos];
    // Spread tokens at same node
    const samePosPlayers=state.players.filter(p=>p.pos===pl.pos);
    const myIdx=samePosPlayers.indexOf(pl);
    const spread=nodeRadius*0.35;
    const angle=samePosPlayers.length>1?(myIdx/(samePosPlayers.length-1))*Math.PI*2:0;
    const tx=samePosPlayers.length>1?x+Math.cos(angle)*spread*0.7:x;
    const ty=samePosPlayers.length>1?y+Math.sin(angle)*spread*0.7:y;
    const r=nodeRadius*0.38;

    ctx.save();
    ctx.shadowBlur=10;ctx.shadowColor='rgba(0,0,0,.7)';
    ctx.fillStyle=AVATARS[pl.avatarIdx%AVATARS.length].bg;
    ctx.beginPath();ctx.arc(tx,ty,r,0,Math.PI*2);ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.strokeStyle=pi===state.currentPlayerIdx?'#FFD93D':'rgba(255,255,255,.35)';
    ctx.lineWidth=pi===state.currentPlayerIdx?2.5:1.5;
    ctx.beginPath();ctx.arc(tx,ty,r,0,Math.PI*2);ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.font=`${r*1.1}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ge(pl.avatarIdx),tx,ty);
    ctx.restore();
  });
}

  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},1600);
}

/* ========================================================
   MOVEMENT — Player moves along graph
   ======================================================== */
// Move player n steps in given direction (+1 fwd / -1 bwd)
// At each step the next node is chosen from adjacency
// (preference: continue same ring direction)
function movePlayer(direction){
  if(!state.diceRolled||state.paused)return;
  const p=state.players[state.currentPlayerIdx];
  let steps=state.diceValue;
  let cur=p.pos;
  let prevNode=-1;

  while(steps>0){
    const neighbors=[...GRAPH[cur]].filter(n=>n!==prevNode);
    if(!neighbors.length) break;

    // On ring nodes: prefer ring neighbors
    // fwd = higher index on same ring (wrapping); bwd = lower
    let next;
    if(cur<OUTER_N){
      // outer ring
      const fwdN=(cur+1)%OUTER_N;
      const bwdN=(cur-1+OUTER_N)%OUTER_N;
      if(direction===1 && neighbors.includes(fwdN)) next=fwdN;
      else if(direction===-1 && neighbors.includes(bwdN)) next=bwdN;
      else next=neighbors[0];
    } else {
      // inner ring
      const rel=cur-OUTER_N;
      const fwdN=OUTER_N+((rel+1)%INNER_N);
      const bwdN=OUTER_N+((rel-1+INNER_N)%INNER_N);
      if(direction===1 && neighbors.includes(fwdN)) next=fwdN;
      else if(direction===-1 && neighbors.includes(bwdN)) next=bwdN;
      else next=neighbors[0];
    }
    prevNode=cur;
    cur=next;
    steps--;
  }

  p.pos=cur;
  state.diceRolled=false;
  const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
  diceBtn.textContent='🎲';
  document.getElementById('diceNum').textContent='?';
  document.getElementById('dirBtns').style.display='none';
  updateBoardHeader();
  renderMiniScores();
  drawBoard();

  // Land on node
  const cat=BOARD_CATS[cur];
  if(cat==='start'){
    p.score++;renderMiniScores();
    showToast('🏠','¡Salida! +1 🧀');
    setTimeout(advanceTurn,1800);
  } else if(cat==='junction'){
    showToast('🔀','¡Cruce! Sigue moviendo');
    setTimeout(advanceTurn,1800);
  } else if(state.selectedCats.includes(cat)){
    setTimeout(()=>openQuestion(cat),400);
  } else {
    advanceTurn();
  }
}

document.getElementById('btnLeft').addEventListener('click',()=>movePlayer(-1));
document.getElementById('btnRight').addEventListener('click',()=>movePlayer(1));

/* ========================================================
   QUESTIONS
   ======================================================== */
function getQ(cat){
  const pool=QUESTIONS[cat];
  if(!pool||!pool.length)return null;
  let avail=pool.map((_,i)=>i).filter(i=>!state.usedQ[cat].includes(i));
  if(!avail.length){state.usedQ[cat]=[];avail=pool.map((_,i)=>i);}
  const ri=avail[Math.floor(Math.random()*avail.length)];
  state.usedQ[cat].push(ri);
  return {...pool[ri]};
}

function openQuestion(cat){
  const q=getQ(cat);if(!q)return advanceTurn();
  state.currentQ=q;state.answered=false;
  const p=state.players[state.currentPlayerIdx];
  document.getElementById('qAv').style.cssText=ga(p.avatarIdx);
  document.getElementById('qAv').textContent=ge(p.avatarIdx);
  document.getElementById('qPname').textContent=p.name||'Jugador';
  document.getElementById('qPmode').textContent=p.mode==='baby'?'👶 Modo bebé':p.mode==='adult'?'🎓 Modo adulto':'🧒 Modo niño';
  renderQuestion(q,p.mode);
  showScreen('question');
}

function renderQuestion(q,mode){
  const area=document.getElementById('qArea');
  const cd=CAT_DEF[q.cat];
  const isBaby=mode==='baby',isAdult=mode==='adult';
  const qText=isAdult?q.q_adult:q.q_kid;
  const answers=isAdult?q.answers_adult:q.answers_kid;
  const correct=isAdult?q.correct_adult:q.correct_kid;
  const shuffled=[0,1,2,3].sort(()=>Math.random()-.5);

  area.innerHTML=`
    <div class="q-cat" style="background:${cd.light};color:${cd.color}">${cd.emoji} ${cd.label}</div>
    ${isBaby?'<div class="q-banner baby">👶 Modo bebé — ¡Toca la imagen!</div>':''}
    ${isAdult?'<div class="q-banner adult">🎓 Pregunta avanzada</div>':''}
    <div class="q-img"><span class="qem">${q.img}</span><div class="qlbl">${q.label}</div></div>
    <div class="q-text">${qText}</div>
    <div class="${isBaby?'a-grid-baby':'a-grid'}" id="answersGrid"></div>`;

  const grid=document.getElementById('answersGrid');
  shuffled.forEach((origIdx,pos)=>{
    const btn=document.createElement('button');
    if(isBaby){
      const ba=q.babyAnswers[origIdx];
      btn.className=`a-btn-baby bc${pos}`;
      btn.innerHTML=`<div class="aem">${ba.emoji}</div><div class="albl">${ba.label}</div>`;
    }else{
      btn.className='a-btn';btn.textContent=answers[origIdx];
    }
    btn.dataset.origIdx=origIdx;
    btn.addEventListener('click',()=>handleAnswer(btn,origIdx,correct));
    grid.appendChild(btn);
  });
}

function handleAnswer(btn,selectedIdx,correctIdx){
  if(state.answered)return;
  state.answered=true;
  const player=state.players[state.currentPlayerIdx];
  player.total++;
  const ok=selectedIdx===correctIdx;
  document.querySelectorAll('.a-btn,.a-btn-baby').forEach(b=>{
    b.disabled=true;
    if(+b.dataset.origIdx===correctIdx)b.classList.add('correct');
    else if(+b.dataset.origIdx===selectedIdx&&!ok)b.classList.add('wrong');
  });
  if(ok)player.correct++;
  setTimeout(()=>showFeedback(ok,player),680);
}

/* ========================================================
   FEEDBACK
   ======================================================== */
function showFeedback(ok,player){
  if(ok){player.score++;renderMiniScores();}
  const ov=document.createElement('div');ov.className='fb-ov';
  const msg=ok?{em:'🎉',title:'¡Correcto!',sub:`¡Genial, ${player.name||'Jugador'}!\n¡Ganas un quesito!`}
               :{em:'😅',title:'¡Oh no!',  sub:`No pasa nada, ${player.name||'Jugador'}.\n¡Al siguiente!`};
  ov.innerHTML=`
    <div class="fb-card">
      <div class="fb-em">${msg.em}</div>
      <div class="fb-title" style="color:${ok?'var(--green)':'var(--red)'}">${msg.title}</div>
      <div class="fb-sub">${msg.sub}</div>
      ${ok?`<div class="queso-row">🧀 +1 Quesito • Total: ${player.score}</div>`:''}
      <button class="btn btn-primary w-full" id="nextBtn" style="justify-content:center;">${ok?'🎊 Siguiente':'➡️ Continuar'}</button>
    </div>`;
  document.body.appendChild(ov);
  document.getElementById('nextBtn').addEventListener('click',()=>{ov.remove();advanceTurn();showScreen('board');});
  if(ok)launchConfetti();
}

function advanceTurn(){
  state.currentPlayerIdx=(state.currentPlayerIdx+1)%state.players.length;
  state.diceRolled=false;
  diceBtn.textContent='🎲';
  document.getElementById('diceNum').textContent='?';
  document.getElementById('dirBtns').style.display='none';
  updateBoardHeader();renderMiniScores();drawBoard();
}

/* ========================================================
   CONFETTI
   ======================================================== */
function launchConfetti(){
  const cls=['#FFD93D','#FF6B9D','#6BCB77','#4ECDC4','#A29BFE','#FF8C42'];
  for(let i=0;i<30;i++){
    const c=document.createElement('div');c.className='cfp';
    c.style.cssText=`left:${Math.random()*100}%;background:${cls[~~(Math.random()*cls.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(c);c.addEventListener('animationend',()=>c.remove());
  }
}

/* ========================================================
   PAUSE
   ======================================================== */
document.getElementById('pauseBtn').addEventListener('click',()=>{
  state.paused=true;
  const ov=document.createElement('div');ov.className='pause-ov';
  ov.innerHTML=`<h2>⏸ Pausa</h2><p style="color:var(--text2);text-align:center;max-width:240px;margin-bottom:4px;">El juego está pausado.<br>¡Descansad!</p>
    <button class="btn btn-primary" id="resumeBtn" style="font-size:1rem;padding:13px 28px;">▶️ Continuar</button>
    <button class="btn btn-danger" id="endEarlyBtn" style="font-size:.86rem;padding:10px 20px;">🏁 Terminar</button>`;
  document.body.appendChild(ov);
  document.getElementById('resumeBtn').addEventListener('click',()=>{state.paused=false;ov.remove();});
  document.getElementById('endEarlyBtn').addEventListener('click',()=>{ov.remove();endGame();});
});

/* ========================================================
   END GAME
   ======================================================== */
function endGame(){
  if(state.timerInterval)clearInterval(state.timerInterval);
  showScreen('results');renderResults();
  setTimeout(launchConfetti,300);setTimeout(launchConfetti,900);
}

function renderResults(){
  const sorted=[...state.players].sort((a,b)=>b.score-a.score||b.correct-a.correct);
  const pO=sorted.length>=3?[sorted[1],sorted[0],sorted[2]]:sorted.length===2?[sorted[1],sorted[0]]:[sorted[0]];
  const pC=sorted.length>=3?['silver','gold','bronze']:sorted.length===2?['silver','gold']:['gold'];
  const pH=sorted.length>=3?[58,82,42]:sorted.length===2?[58,82]:[82];
  const pK=sorted.length>=3?['🥈','🥇','🥉']:sorted.length===2?['🥈','🥇']:['🥇'];
  document.getElementById('podiumArea').innerHTML=pO.map((p,i)=>`
    <div class="podium-place"><div class="podium-crown">${pK[i]}</div>
    <div class="podium-av" style="${ga(p.avatarIdx)}">${ge(p.avatarIdx)}</div>
    <div class="podium-name">${p.name||'J'}</div>
    <div class="podium-block ${pC[i]}" style="height:${pH[i]}px">${p.score}</div></div>`).join('');
  const medals=['🥇','🥈','🥉'];
  document.getElementById('resultsList').innerHTML=sorted.map((p,i)=>`
    <div class="result-item">
      <div class="result-pos">${medals[i]||(i+1)+'º'}</div>
      <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;${ga(p.avatarIdx)}">${ge(p.avatarIdx)}</div>
      <div class="result-info">
        <div class="result-name">${p.name||'J'} <span class="mode-badge ${p.mode}">${p.mode==='baby'?'👶':p.mode==='adult'?'🎓':'🧒'}</span></div>
        <div class="result-stats">${p.correct} correctas · ${p.total} preguntas</div>
      </div>
      <div class="result-score">🧀 ${p.score}</div>
    </div>`).join('');
}

document.getElementById('playAgainBtn').addEventListener('click',()=>{showScreen('welcome');initDefaultPlayers();renderPlayerList();});
window.addEventListener('resize',()=>{if(document.getElementById('screen-board').classList.contains('active'))drawBoard();});

/* ========================================================
   INIT
   ======================================================== */
initDefaultPlayers();
renderPlayerList();
state.gameTime=60;
</script>
