<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trivial Familiar ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --yellow:#FFD93D;--pink:#FF6B9D;--blue:#4ECDC4;--purple:#A29BFE;
  --orange:#FF8C42;--green:#6BCB77;--red:#FF4757;--teal:#00CEC9;
  --bg:#0D1117;--card:#161B22;--card2:#1C2333;--card3:#21262D;
  --text:#F0F6FC;--text2:#8B949E;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(162,155,254,.12) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(78,205,196,.08) 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,rgba(255,107,157,.04) 0%,transparent 70%);pointer-events:none;z-index:0;}

.screen{display:none;position:relative;z-index:1;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 3s infinite;}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.9;transform:scale(1.4)}}

/* BUTTONS */
.btn{font-family:'Fredoka One',cursive;font-size:1rem;border:none;border-radius:50px;padding:12px 24px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;letter-spacing:.3px;}
.btn:active{transform:scale(.95);}
.btn-primary{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#0D1117;box-shadow:0 5px 18px rgba(255,140,66,.35);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,140,66,.5);}
.btn-secondary{background:linear-gradient(135deg,var(--purple),var(--blue));color:white;box-shadow:0 5px 18px rgba(162,155,254,.25);}
.btn-danger{background:linear-gradient(135deg,#ff6b6b,var(--red));color:white;}
.btn-sm{padding:8px 16px;font-size:.88rem;}

/* ===========================
   WELCOME SCREEN
   =========================== */
#screen-welcome{align-items:center;justify-content:flex-start;padding:16px 16px 32px;gap:16px;text-align:center;overflow-y:auto;}
.logo-area{animation:float 3s ease-in-out infinite;flex-shrink:0;padding-top:8px;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.logo-emoji{font-size:3.5rem;}
.logo-title{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,7vw,2.6rem);background:linear-gradient(135deg,var(--yellow),var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:4px;}

.welcome-card{background:var(--card);border-radius:20px;padding:20px;max-width:440px;width:100%;border:1px solid rgba(255,255,255,.07);box-shadow:0 16px 48px rgba(0,0,0,.5);}
.wc-title{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--yellow);margin-bottom:12px;}
.divider{height:1px;background:rgba(255,255,255,.06);margin:16px 0;}

/* PLAYER LIST */
.player-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
.player-item{background:var(--card2);border-radius:14px;padding:10px 12px;display:flex;flex-direction:column;gap:0;border:2px solid rgba(255,255,255,.06);animation:slideIn .3s ease;transition:border-color .25s,background .25s;}
.player-item.mode-baby{border-color:rgba(255,107,157,.45);background:rgba(255,107,157,.06);}
.player-item.mode-adult{border-color:rgba(162,155,254,.45);background:rgba(162,155,254,.06);}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
.player-row-top{display:flex;align-items:center;gap:9px;}
.player-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;cursor:pointer;transition:transform .2s;}
.player-avatar:hover{transform:scale(1.12);}
.player-name-input{flex:1;background:transparent;border:none;color:white;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;outline:none;min-width:0;}
.player-name-input::placeholder{color:rgba(255,255,255,.25);}
.remove-player{background:rgba(255,71,87,.18);border:none;color:var(--red);border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.remove-player:hover{background:var(--red);color:white;}

/* MODE SELECTOR */
.mode-row{display:flex;align-items:center;gap:8px;padding:8px 2px 2px;border-top:1px solid rgba(255,255,255,.05);margin-top:8px;}
.mode-row label{font-size:.78rem;font-weight:800;color:var(--text2);flex-shrink:0;}
.mode-pills{display:flex;gap:6px;flex:1;}
.mode-pill{flex:1;padding:5px 4px;border:2px solid rgba(255,255,255,.1);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-family:'Fredoka One',cursive;font-size:.72rem;text-align:center;transition:all .2s;white-space:nowrap;}
.mode-pill.active-kid{border-color:#4ECDC4;background:rgba(78,205,196,.15);color:#4ECDC4;}
.mode-pill.active-baby{border-color:var(--pink);background:rgba(255,107,157,.15);color:var(--pink);}
.mode-pill.active-adult{border-color:var(--purple);background:rgba(162,155,254,.15);color:var(--purple);}
.mode-badge{font-size:.68rem;font-weight:800;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.mode-badge.kid{background:rgba(78,205,196,.2);color:#4ECDC4;}
.mode-badge.baby{background:rgba(255,107,157,.2);color:var(--pink);}
.mode-badge.adult{background:rgba(162,155,254,.2);color:var(--purple);}

.add-player-btn{background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.18);border-radius:14px;padding:11px;color:var(--text2);cursor:pointer;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;width:100%;transition:all .2s;}
.add-player-btn:hover{border-color:var(--purple);color:var(--purple);background:rgba(162,155,254,.08);}

/* TIME / CAT */
.time-selector{display:flex;gap:8px;margin-bottom:16px;}
.time-btn{flex:1;padding:11px 4px;border:2px solid rgba(255,255,255,.12);border-radius:14px;background:transparent;color:var(--text2);cursor:pointer;font-family:'Fredoka One',cursive;font-size:.95rem;transition:all .2s;text-align:center;}
.time-btn.selected{border-color:var(--yellow);background:rgba(255,217,61,.12);color:var(--yellow);}
.category-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px;}
.cat-btn{padding:12px 6px;border:2px solid rgba(255,255,255,.08);border-radius:14px;background:var(--card2);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.76rem;color:var(--text2);transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;}
.cat-btn .cat-emoji{font-size:1.6rem;}
.cat-btn[data-cat="patrulla"].selected{color:#FF6B35;background:rgba(255,107,53,.18);border-color:#FF6B35;}
.cat-btn[data-cat="disney"].selected{color:#4ECDC4;background:rgba(78,205,196,.18);border-color:#4ECDC4;}
.cat-btn[data-cat="superheroes"].selected{color:#A29BFE;background:rgba(162,155,254,.18);border-color:#A29BFE;}
.cat-btn[data-cat="viajes"].selected{color:#FFD93D;background:rgba(255,217,61,.12);border-color:#FFD93D;}

/* ===========================
   BOARD SCREEN
   =========================== */
#screen-board{padding:0;overflow:hidden;}

.board-header{background:var(--card);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;gap:10px;}
.timer-display{display:flex;align-items:center;gap:5px;background:var(--card2);padding:7px 12px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:.95rem;white-space:nowrap;}
.timer-display.warning{color:var(--red);animation:pulse .5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* BOARD CANVAS AREA */
.board-area{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#boardCanvas{display:block;touch-action:none;}

/* DICE PANEL */
.dice-panel{background:var(--card);border-top:1px solid rgba(255,255,255,.05);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.dice-btn{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--card2),var(--card3));border:2px solid rgba(255,255,255,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2.2rem;transition:all .25s;box-shadow:0 4px 16px rgba(0,0,0,.4);flex-shrink:0;}
.dice-btn:hover{transform:scale(1.06);}
.dice-btn.rolling{animation:diceRoll .5s ease;}
.dice-btn.used{opacity:.45;cursor:not-allowed;}
@keyframes diceRoll{0%{transform:scale(1) rotate(0)}25%{transform:scale(1.15) rotate(-15deg)}50%{transform:scale(1.15) rotate(15deg)}75%{transform:scale(1.05) rotate(-8deg)}100%{transform:scale(1) rotate(0)}}
.dice-result{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--yellow);min-width:40px;text-align:center;}
.dice-info{flex:1;min-width:0;}
.dice-info .turn-name{font-family:'Fredoka One',cursive;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dice-info .turn-hint{font-size:.75rem;color:var(--text2);margin-top:2px;}

/* MINI SCOREBOARD on board */
.mini-scores{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:5px;z-index:5;}
.mini-score-item{background:rgba(13,17,23,.8);border-radius:10px;padding:5px 9px;display:flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(6px);}
.mini-score-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;}
.mini-score-name{font-size:.72rem;font-weight:800;max-width:55px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mini-score-pts{font-family:'Fredoka One',cursive;font-size:.78rem;color:var(--yellow);}
.mini-score-item.active-turn{border-color:var(--yellow);background:rgba(255,217,61,.1);}

/* ===========================
   QUESTION SCREEN
   =========================== */
#screen-question{padding:0;}
.q-header{background:var(--card);padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.q-back-btn{background:var(--card2);border:none;color:var(--text2);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.q-player-info{flex:1;min-width:0;}
.q-player-name{font-weight:800;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-player-mode{font-size:.72rem;color:var(--text2);}
.q-timer{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--yellow);}

.q-area{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.q-cat-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:50px;font-size:.8rem;font-weight:800;align-self:flex-start;}
.q-mode-banner{border-radius:12px;padding:7px 12px;display:flex;align-items:center;gap:7px;font-size:.8rem;font-weight:800;}
.q-mode-banner.baby{background:rgba(255,107,157,.15);border:1px solid rgba(255,107,157,.35);color:#ffb3d0;}
.q-mode-banner.adult{background:rgba(162,155,254,.15);border:1px solid rgba(162,155,254,.35);color:#c9c3ff;}

.q-image-area{border-radius:18px;overflow:hidden;background:var(--card2);height:130px;display:flex;align-items:center;justify-content:center;position:relative;border:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.q-image-area .q-emoji{font-size:4.5rem;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));animation:float 2s ease-in-out infinite;}
.q-image-area .q-img-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:14px 10px 7px;font-size:.74rem;font-weight:700;color:rgba(255,255,255,.8);text-align:center;}

.q-text{font-family:'Fredoka One',cursive;font-size:clamp(1rem,3.5vw,1.28rem);line-height:1.45;text-align:center;color:white;padding:2px 4px;}

/* NORMAL ANSWERS */
.a-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.a-btn{background:var(--card2);border:2px solid rgba(255,255,255,.09);border-radius:14px;padding:13px 10px;color:white;font-family:'Nunito',sans-serif;font-size:.86rem;font-weight:800;cursor:pointer;transition:all .2s;text-align:center;line-height:1.3;}
.a-btn:hover:not(:disabled){border-color:var(--purple);background:rgba(162,155,254,.14);transform:scale(1.02);}
/* BABY ANSWERS */
.a-grid-baby{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.a-btn-baby{background:var(--card2);border:3px solid rgba(255,255,255,.1);border-radius:20px;padding:14px 8px 12px;color:white;cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px;min-height:108px;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.25);}
.a-btn-baby:hover:not(:disabled){transform:scale(1.05);}
.a-btn-baby:active:not(:disabled){transform:scale(.97);}
.a-btn-baby .a-em{font-size:2.8rem;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3));}
.a-btn-baby .a-lbl{font-family:'Fredoka One',cursive;font-size:.85rem;color:rgba(255,255,255,.85);}
.a-btn-baby.bc0{border-color:rgba(255,107,157,.4);background:rgba(255,107,157,.1);}
.a-btn-baby.bc1{border-color:rgba(78,205,196,.4);background:rgba(78,205,196,.1);}
.a-btn-baby.bc2{border-color:rgba(255,217,61,.35);background:rgba(255,217,61,.08);}
.a-btn-baby.bc3{border-color:rgba(162,155,254,.4);background:rgba(162,155,254,.1);}

/* CORRECT / WRONG */
.a-btn.correct,.a-btn-baby.correct{background:rgba(107,203,119,.28)!important;border-color:var(--green)!important;animation:cpop .5s ease;}
.a-btn.wrong,.a-btn-baby.wrong{background:rgba(255,71,87,.28)!important;border-color:var(--red)!important;animation:cshake .4s ease;}
.a-btn:disabled,.a-btn-baby:disabled{cursor:default;}
@keyframes cpop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes cshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* FEEDBACK */
.fb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(5px);animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fb-card{background:var(--card);border-radius:24px;padding:26px 22px;max-width:300px;width:88%;text-align:center;box-shadow:0 28px 70px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.09);animation:popIn .28s cubic-bezier(.175,.885,.32,1.275);}
@keyframes popIn{from{opacity:0;transform:scale(.82) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
.fb-em{font-size:3.2rem;margin-bottom:8px;}
.fb-title{font-family:'Fredoka One',cursive;font-size:1.6rem;margin-bottom:5px;}
.fb-sub{color:var(--text2);font-size:.88rem;margin-bottom:14px;line-height:1.4;white-space:pre-line;}
.queso-row{background:rgba(255,217,61,.12);border:2px solid var(--yellow);border-radius:12px;padding:9px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:7px;font-family:'Fredoka One',cursive;color:var(--yellow);font-size:.95rem;}

/* RESULTS */
#screen-results{padding:18px;align-items:center;gap:16px;overflow-y:auto;}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;width:100%;max-width:340px;margin:4px 0;}
.podium-place{display:flex;flex-direction:column;align-items:center;gap:5px;}
.podium-crown{font-size:1.5rem;}
.podium-avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.45rem;border:3px solid rgba(255,255,255,.25);}
.podium-name{font-family:'Fredoka One',cursive;font-size:.78rem;text-align:center;max-width:76px;}
.podium-block{border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.3rem;color:rgba(0,0,0,.3);width:74px;}
.podium-block.gold{height:85px;background:linear-gradient(135deg,var(--yellow),#FFB700);}
.podium-block.silver{height:60px;background:linear-gradient(135deg,#C8C8C8,#A0A0A0);}
.podium-block.bronze{height:44px;background:linear-gradient(135deg,#CD7F32,#9A5C24);}
.results-list{width:100%;max-width:400px;display:flex;flex-direction:column;gap:7px;}
.result-item{background:var(--card);border-radius:14px;padding:11px 13px;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.05);}
.result-pos{font-family:'Fredoka One',cursive;font-size:1.25rem;width:28px;text-align:center;}
.result-info{flex:1;}
.result-name{font-weight:800;font-size:.92rem;}
.result-stats{font-size:.76rem;color:var(--text2);}
.result-score{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--yellow);}

/* CONFETTI */
.cfp{position:fixed;width:9px;height:9px;top:-10px;border-radius:2px;animation:cffall linear forwards;z-index:300;pointer-events:none;}
@keyframes cffall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* PAUSE */
.pause-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:250;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;backdrop-filter:blur(10px);}
.pause-ov h2{font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--yellow);}

/* MOVE TOAST */
.move-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(13,17,23,.9);border:2px solid var(--yellow);border-radius:20px;padding:18px 28px;text-align:center;z-index:150;backdrop-filter:blur(8px);animation:popIn .25s ease;pointer-events:none;}
.move-toast .mt-num{font-family:'Fredoka One',cursive;font-size:3.5rem;color:var(--yellow);line-height:1;}
.move-toast .mt-txt{font-size:.9rem;color:var(--text2);margin-top:4px;}

::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
.w-full{width:100%}
</style>
</head>
<body>
<div class="stars" id="starsContainer"></div>

<!-- ===================== WELCOME ===================== -->
<div id="screen-welcome" class="screen active">
  <div style="padding-top:16px;">
    <div class="logo-area" style="text-align:center;">
      <div class="logo-emoji">🌟</div>
      <div class="logo-title">¡Trivial!</div>
      <div style="color:var(--text2);font-size:.82rem;margin-top:2px;">El juego de la familia</div>
    </div>
  </div>
  <div class="welcome-card" style="margin-bottom:24px;">
    <div class="wc-title">👥 ¿Quién juega hoy?</div>
    <div class="player-list" id="playerList"></div>
    <button class="add-player-btn" id="addPlayerBtn">+ Añadir jugador</button>
    <div class="divider"></div>
    <div class="wc-title">⏱ ¿Cuánto tiempo?</div>
    <div class="time-selector">
      <button class="time-btn" data-min="30">30 min</button>
      <button class="time-btn selected" data-min="60">60 min</button>
      <button class="time-btn" data-min="90">90 min</button>
    </div>
    <div class="divider"></div>
    <div class="wc-title">🎯 Categorías</div>
    <div class="category-grid">
      <button class="cat-btn selected" data-cat="patrulla"><span class="cat-emoji">🐾</span>Patrulla Canina</button>
      <button class="cat-btn selected" data-cat="disney"><span class="cat-emoji">✨</span>Disney</button>
      <button class="cat-btn selected" data-cat="superheroes"><span class="cat-emoji">🦸</span>Superhéroes</button>
      <button class="cat-btn selected" data-cat="viajes"><span class="cat-emoji">🌍</span>Viajes</button>
    </div>
    <button class="btn btn-primary w-full" id="startGameBtn" style="justify-content:center;font-size:1.15rem;padding:15px;">🚀 ¡Empezar!</button>
  </div>
</div>

<!-- ===================== BOARD ===================== -->
<div id="screen-board" class="screen">
  <div class="board-header">
    <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
      <div id="bh-avatar" style="width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;"></div>
      <div>
        <div id="bh-name" style="font-weight:800;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;"></div>
        <div id="bh-hint" style="font-size:.7rem;color:var(--text2);"></div>
      </div>

/* ===================================================
   BOARD DRAWING (Canvas)
   =================================================== */
const DICE_FACES=['⚀','⚁','⚂','⚃','⚄','⚅'];
const TOTAL_SQUARES=30;

function getBoardSquares(cx,cy,r){
  const pts=[];
  for(let i=0;i<TOTAL_SQUARES;i++){
    const angle=(i/TOTAL_SQUARES)*Math.PI*2 - Math.PI/2;
    pts.push({x:cx+r*Math.cos(angle),y:cy+r*Math.sin(angle),cat:BOARD_CATS[i],idx:i});
  }
  return pts;
}

let boardSquares=[];
let squareRadius=0;

function drawBoard(){
  const canvas=document.getElementById('boardCanvas');
  const area=canvas.parentElement;
  const W=area.clientWidth, H=area.clientHeight;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  const cx=W/2, cy=H/2;
  const boardR=Math.min(W,H)*0.42;
  squareRadius=Math.min(W,H)*0.072;
  boardSquares=getBoardSquares(cx,cy,boardR);

  ctx.clearRect(0,0,W,H);

  // Draw ring track
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.06)';
  ctx.lineWidth=squareRadius*2+4;
  ctx.beginPath();
  ctx.arc(cx,cy,boardR,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();

  // Center area
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,boardR*0.55);
  grad.addColorStop(0,'rgba(28,35,51,0.9)');
  grad.addColorStop(1,'rgba(13,17,23,0.4)');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.arc(cx,cy,boardR*0.52,0,Math.PI*2);
  ctx.fill();

  // Center text
  ctx.save();
  ctx.font=`bold ${Math.min(W,H)*0.05}px Fredoka One, cursive`;
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🌟 TRIVIAL',cx,cy-10);
  ctx.font=`${Math.min(W,H)*0.03}px Nunito`;
  ctx.fillStyle='rgba(255,255,255,0.07)';
  ctx.fillText('¡Tira el dado!',cx,cy+20);
  ctx.restore();

  // Draw squares
  const p=state.players[state.currentPlayerIdx];
  boardSquares.forEach((sq,i)=>{
    const isStart=sq.cat==='start';
    const cd=isStart?{color:'#FFD93D',light:'rgba(255,217,61,.2)',emoji:'🏠'}:CAT_DEF[sq.cat];
    const isCurrent=state.players.some(pl=>pl.pos===i);
    const isTarget=state.diceRolled && ((p.pos+state.diceValue)%TOTAL_SQUARES)===i && !state.answered;

    // Square BG
    ctx.save();
    ctx.shadowBlur=isTarget?18:isCurrent?12:0;
    ctx.shadowColor=isTarget?'rgba(255,217,61,.8)':cd.color;
    ctx.fillStyle=isTarget?'rgba(255,217,61,.35)':cd.light;
    ctx.strokeStyle=isTarget?'#FFD93D':cd.color;
    ctx.lineWidth=isTarget?3:isCurrent?2.5:1.5;
    ctx.beginPath();
    ctx.arc(sq.x,sq.y,squareRadius,0,Math.PI*2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // Emoji / number
    ctx.save();
    ctx.font=`${squareRadius*0.85}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(isStart?'🏠':cd.emoji,sq.x,sq.y-squareRadius*0.08);
    ctx.restore();

    // Square number
    ctx.save();
    ctx.font=`bold ${squareRadius*0.42}px Nunito`;
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(i===0?'S':(i+1),sq.x,sq.y+squareRadius*0.52);
    ctx.restore();
  });

  // Draw player tokens
  state.players.forEach((pl,pi)=>{
    const sq=boardSquares[pl.pos];
    const offset=state.players.length>1?(pi-(state.players.length-1)/2)*squareRadius*0.42:0;
    const tx=sq.x+Math.cos(Math.PI/4)*offset, ty=sq.y+Math.sin(Math.PI/4)*offset;

    // Token shadow
    ctx.save();
    ctx.shadowBlur=8;ctx.shadowColor='rgba(0,0,0,.6)';
    ctx.fillStyle=AVATARS[pl.avatarIdx%AVATARS.length].bg;
    ctx.beginPath();ctx.arc(tx,ty,squareRadius*0.42,0,Math.PI*2);
    ctx.fill();ctx.restore();

    // Token border (thicker for current player)
    ctx.save();
    ctx.strokeStyle=pi===state.currentPlayerIdx?'#FFD93D':'rgba(255,255,255,.4)';
    ctx.lineWidth=pi===state.currentPlayerIdx?2.5:1.5;
    ctx.beginPath();ctx.arc(tx,ty,squareRadius*0.42,0,Math.PI*2);
    ctx.stroke();ctx.restore();

    // Token emoji
    ctx.save();
    ctx.font=`${squareRadius*0.5}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ge(pl.avatarIdx),tx,ty);
    ctx.restore();
  });
}

function updateBoardHeader(){

  document.getElementById('dicePlayerName').textContent=p.name||'Jugador';
  document.getElementById('diceHint').textContent=state.diceRolled?`Mueve ${state.diceValue} casilla${state.diceValue>1?'s':''}`:
    (state.answered?'Esperando…':'Toca el dado para tirar');
  document.getElementById('diceBtn').classList.toggle('used',state.diceRolled);

function renderMiniScores(){

   DICE

const diceBtn=document.getElementById('diceBtn');
diceBtn.addEventListener('click',()=>{
  if(state.diceRolled||state.paused)return;
  const val=Math.floor(Math.random()*6)+1;
  state.diceValue=val;
  state.diceRolled=true;

  showMoveToast(val);

function showMoveToast(n){
  const t=document.createElement('div');
  t.className='move-toast';
  t.innerHTML=`<div class="mt-num">${n}</div><div class="mt-txt">Mueve ${n} casilla${n>1?'s':''}!</div>`;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},1600);
}

/* ===================================================
   BOARD CLICK → MOVE PLAYER
   =================================================== */
document.getElementById('boardCanvas').addEventListener('click',e=>{
  if(!state.diceRolled||state.paused)return;
  const rect=e.target.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const p=state.players[state.currentPlayerIdx];
  const target=(p.pos+state.diceValue)%TOTAL_SQUARES;

  // Find which square was tapped
  let tapped=-1;
  boardSquares.forEach((sq,i)=>{
    const dx=mx-sq.x,dy=my-sq.y;
    if(Math.sqrt(dx*dx+dy*dy)<squareRadius+6) tapped=i;
  });
  if(tapped<0)return;

  if(tapped!==target){
    // Wrong square: flash warning
    flashWrongSquare(tapped);
    return;
  }

  // Move player!
  p.pos=target;
  state.diceRolled=false;
  diceBtn.textContent='🎲';
  document.getElementById('diceResult').textContent='?';
  drawBoard();

  const cat=BOARD_CATS[target];
  if(cat==='start'){
    // Landing on start = bonus
    p.score++;
    renderMiniScores();
    showBonusToast();
    advanceTurn();
  } else if(state.selectedCats.includes(cat)){
    // Open question
    openQuestion(cat);
  } else {
    advanceTurn();
  }
});

function flashWrongSquare(idx){
  const sq=boardSquares[idx];
  const canvas=document.getElementById('boardCanvas');
  const ctx=canvas.getContext('2d');
  let count=0;
  const flash=setInterval(()=>{
    ctx.save();
    ctx.fillStyle=count%2===0?'rgba(255,71,87,.45)':'transparent';
    ctx.strokeStyle='#FF4757';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(sq.x,sq.y,squareRadius,0,Math.PI*2);
    ctx.fill();ctx.stroke();ctx.restore();
    count++;if(count>5)clearInterval(flash);
  },120);
  setTimeout(drawBoard,750);
}

function showBonusToast(){
  const t=document.createElement('div');
  t.className='move-toast';
  t.innerHTML=`<div class="mt-num">🏠</div><div class="mt-txt">¡Casilla de salida! +1 quesito 🧀</div>`;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},2000);
}

/* ===================================================
   QUESTIONS
   =================================================== */
function getQ(cat){
  const pool=QUESTIONS[cat];
  let avail=pool.map((_,i)=>i).filter(i=>!state.usedQ[cat].includes(i));
  if(!avail.length){state.usedQ[cat]=[];avail=pool.map((_,i)=>i);}
  const ri=avail[Math.floor(Math.random()*avail.length)];
  state.usedQ[cat].push(ri);
  return {...pool[ri]};
}

function openQuestion(cat){
  const q=getQ(cat);
  state.currentQ=q;
  state.answered=false;
  const p=state.players[state.currentPlayerIdx];

  const av=document.getElementById('q-avatar');
  av.style.cssText=ga(p.avatarIdx);av.textContent=ge(p.avatarIdx);
  document.getElementById('q-player-name').textContent=p.name||'Jugador';
  document.getElementById('q-player-mode').textContent=p.mode==='baby'?'👶 Modo bebé':p.mode==='adult'?'🎓 Modo adulto':'🧒 Modo niño';

  renderQuestion(q,p.mode);
  showScreen('question');
}

function renderQuestion(q,mode){
  const area=document.getElementById('qArea');
  const cd=CAT_DEF[q.cat];
  const isBaby=mode==='baby';
  const isAdult=mode==='adult';

  const qText=isBaby?(q.q_kid||q.q_kid):(isAdult?q.q_adult:q.q_kid);
  const answers=isAdult?q.answers_adult:q.answers_kid;
  const correct=isAdult?q.correct_adult:q.correct_kid;

  const shuffled=[0,1,2,3].sort(()=>Math.random()-.5);

  area.innerHTML=`
    <div class="q-cat-badge" style="background:${cd.light};color:${cd.color}">${cd.emoji} ${cd.label}</div>
    ${isBaby?'<div class="q-mode-banner baby">👶 Modo bebé — ¡Toca la imagen correcta!</div>':''}
    ${isAdult?'<div class="q-mode-banner adult">🎓 Modo adulto — pregunta avanzada</div>':''}
    <div class="q-image-area"><span class="q-emoji">${q.img}</span><div class="q-img-label">${q.label}</div></div>
    <div class="q-text">${qText}</div>
    <div class="${isBaby?'a-grid-baby':'a-grid'}" id="answersGrid"></div>
  `;

  const grid=document.getElementById('answersGrid');
  shuffled.forEach((origIdx,pos)=>{
    const btn=document.createElement('button');
    if(isBaby){
      const ba=q.babyAnswers[origIdx];
      btn.className=`a-btn-baby bc${pos}`;
      btn.innerHTML=`<div class="a-em">${ba.emoji}</div><div class="a-lbl">${ba.label}</div>`;
    }else{
      btn.className='a-btn';
      btn.textContent=answers[origIdx];
    }
    btn.dataset.origIdx=origIdx;
    btn.dataset.correct=correct;
    btn.addEventListener('click',()=>handleAnswer(btn,origIdx,correct,mode));
    grid.appendChild(btn);
  });
}

function handleAnswer(btn,selectedIdx,correctIdx,mode){
  if(state.answered)return;
  state.answered=true;
  const player=state.players[state.currentPlayerIdx];
  player.total++;
  const ok=selectedIdx===correctIdx;
  document.querySelectorAll('.a-btn,.a-btn-baby').forEach(b=>{
    b.disabled=true;
    if(+b.dataset.origIdx===correctIdx)b.classList.add('correct');
    else if(+b.dataset.origIdx===selectedIdx&&!ok)b.classList.add('wrong');
  });
  if(ok)player.correct++;
  setTimeout(()=>showFeedback(ok,player),680);
}

/* ===================================================
   FEEDBACK
   =================================================== */
function showFeedback(ok,player){
  if(ok){player.score++;renderMiniScores();}
  const ov=document.createElement('div');ov.className='fb-overlay';
  const msg=ok?{em:'🎉',title:'¡Correcto!',sub:`¡Genial, ${player.name||'Jugador'}!\n¡Ganas un quesito!`}
               :{em:'😅',title:'¡Oh no!',sub:`No pasa nada, ${player.name||'Jugador'}.\n¡Al siguiente!`};
  ov.innerHTML=`
    <div class="fb-card">
      <div class="fb-em">${msg.em}</div>
      <div class="fb-title" style="color:${ok?'var(--green)':'var(--red)'}">${msg.title}</div>
      <div class="fb-sub">${msg.sub}</div>
      ${ok?`<div class="queso-row">🧀 +1 Quesito • Total: ${player.score}</div>`:''}
      <button class="btn btn-primary w-full" id="nextBtn" style="justify-content:center;">${ok?'🎊 Siguiente':'➡️ Continuar'}</button>
    </div>`;
  document.body.appendChild(ov);
  document.getElementById('nextBtn').addEventListener('click',()=>{
    ov.remove();
    advanceTurn();
    showScreen('board');
  });
  if(ok)confetti();
}

function advanceTurn(){
  state.currentPlayerIdx=(state.currentPlayerIdx+1)%state.players.length;
  state.diceRolled=false;
  diceBtn.textContent='🎲';
  document.getElementById('diceResult').textContent='?';
  updateBoardHeader();
  renderMiniScores();
  drawBoard();
}

/* ===================================================
   CONFETTI
   =================================================== */
function confetti(){
  const cls=['#FFD93D','#FF6B9D','#6BCB77','#4ECDC4','#A29BFE','#FF8C42'];
  for(let i=0;i<32;i++){
    const c=document.createElement('div');c.className='cfp';
    c.style.cssText=`left:${Math.random()*100}%;background:${cls[Math.floor(Math.random()*cls.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};`;
    document.body.appendChild(c);c.addEventListener('animationend',()=>c.remove());
  }
}

  document.getElementById('endEarlyBtn').addEventListener('click',()=>{ov.remove();endGame();});
});

/* ===================================================
   END GAME
   =================================================== */
function endGame(){
  if(state.timerInterval)clearInterval(state.timerInterval);
  showScreen('results');
  renderResults();
  setTimeout(confetti,300);setTimeout(confetti,900);
}

function renderResults(){
  const sorted=[...state.players].sort((a,b)=>b.score-a.score||b.correct-a.correct);
  const pO=sorted.length>=3?[sorted[1],sorted[0],sorted[2]]:sorted.length===2?[sorted[1],sorted[0]]:[sorted[0]];
  const pC=sorted.length>=3?['silver','gold','bronze']:sorted.length===2?['silver','gold']:['gold'];
  const pH=sorted.length>=3?[60,85,44]:sorted.length===2?[60,85]:[85];
  const pK=sorted.length>=3?['🥈','🥇','🥉']:sorted.length===2?['🥈','🥇']:['🥇'];
  document.getElementById('podiumArea').innerHTML=pO.map((p,i)=>`
    <div class="podium-place"><div class="podium-crown">${pK[i]}</div>
    <div class="podium-avatar" style="${ga(p.avatarIdx)}">${ge(p.avatarIdx)}</div>
    <div class="podium-name">${p.name||'J'}</div>
    <div class="podium-block ${pC[i]}" style="height:${pH[i]}px">${p.score}</div></div>`).join('');
  const medals=['🥇','🥈','🥉'];
  document.getElementById('resultsList').innerHTML=sorted.map((p,i)=>`
    <div class="result-item">
      <div class="result-pos">${medals[i]||(i+1)+'º'}</div>
      <div style="width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;${ga(p.avatarIdx)}">${ge(p.avatarIdx)}</div>
      <div class="result-info"><div class="result-name">${p.name||'Jugador'} <span class="mode-badge ${p.mode}">${p.mode==='baby'?'👶':p.mode==='adult'?'🎓':'🧒'}</span></div>
      <div class="result-stats">${p.correct} correctas · ${p.total} preguntas · casilla ${p.pos+1}</div></div>
      <div class="result-score">🧀 ${p.score}</div>
    </div>`).join('');
}

document.getElementById('playAgainBtn').addEventListener('click',()=>{showScreen('welcome');initDefaultPlayers();renderPlayerList();});

/* ===================================================
   RESIZE BOARD
   =================================================== */
window.addEventListener('resize',()=>{if(document.getElementById('screen-board').classList.contains('active'))drawBoard();});

/* ===================================================
   INIT
   =================================================== */
initDefaultPlayers();
renderPlayerList();
state.gameTime=60;
</script>
</body>
</html>
